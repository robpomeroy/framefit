name: Release Build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --name framefit framefit.py

      - name: Rename and stage binary
        id: artifact
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            mv dist/framefit.exe dist/framefit-windows-x64.exe
            echo "path=dist/framefit-windows-x64.exe" >> $GITHUB_OUTPUT
            echo "name=framefit-windows-x64.exe" >> $GITHUB_OUTPUT
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            mv dist/framefit dist/framefit-macos-x64
            echo "path=dist/framefit-macos-x64" >> $GITHUB_OUTPUT
            echo "name=framefit-macos-x64" >> $GITHUB_OUTPUT
          else
            mv dist/framefit dist/framefit-linux-x64
            echo "path=dist/framefit-linux-x64" >> $GITHUB_OUTPUT
            echo "name=framefit-linux-x64" >> $GITHUB_OUTPUT
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.path }}

      - name: Attach binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifact.outputs.path }}
